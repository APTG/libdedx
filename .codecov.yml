coverage:
  status:
    patch:
      default:
        target: 70%
        threshold: 2%
    project:
      default:
        target: 70%
        threshold: 1%
ignore:
  - ".github/**"
  - "cmake/**"
  - "**/CMakeLists.txt"
  - "tests/install_smoke_test.cmake"
  - "tests/install_consumer_cmake/**"
  - "examples/**"
