name: Python

on: [push, pull_request]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure and build (shared library)
        run: |
          cmake -S . -B build -DBUILD_SHARED_LIBS=ON
          cmake --build build --parallel

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python package and dev dependencies
        run: python -m pip install -e "python[dev]"

      - name: Run ruff
        run: python -m ruff check python

      - name: Run tests
        run: |
          LIBDEDX_SO=build/libdedx/libdedx.so pytest python/tests/ -v
