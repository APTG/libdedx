name: clang-format

on:
  push:
  pull_request:

jobs:
  clang-format:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Check clang-format version
        run: |
          clang-format --version
          MAJOR=$(clang-format --version | sed -E 's/.*version ([0-9]+).*/\1/')
          if [ "$MAJOR" -lt 18 ]; then
            echo "clang-format >= 18 required"
            exit 1
          fi

      - name: Check formatting
        run: |
          find . \
            \( -name '*.c' -o -name '*.h' \) \
            -not -path './build/*' \
            -not -path './cmake-build-*/*' \
            -not -path './CMakeFiles/*' \
            -not -path './Testing/*' \
            -not -path './dist/*' \
            -not -path './out/*' \
            -not -path './.git/*' \
            -print0 \
            | xargs -0 clang-format --dry-run --Werror --style=file
