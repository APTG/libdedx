name: Build Android Binaries

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        abi: [arm64-v8a, armeabi-v7a, x86_64]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d

      - name: Configure
        run: >
          cmake -S . -B build-${{ matrix.abi }}
          -DDEDX_BUILD_EXAMPLES=OFF
          -DDEDX_BUILD_TESTS=OFF
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_TOOLCHAIN_FILE=${{ steps.setup-ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake
          -DANDROID_ABI=${{ matrix.abi }}
          -DANDROID_PLATFORM=21
          -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/stage/${{ matrix.abi }}

      - name: Build
        run: cmake --build build-${{ matrix.abi }} --parallel --target dedx_shared

      - name: Collect Android shared library
        run: |
          mkdir -p dist
          cp "build-${{ matrix.abi }}/src/libdedx.so" "dist/libdedx-android-${{ matrix.abi }}.so"

      - name: Upload artifact for testing
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v7
        with:
          name: libdedx-android-${{ matrix.abi }}
          path: dist/libdedx-android-${{ matrix.abi }}.so
          retention-days: 3

      - name: Upload artifact to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/libdedx-android-${{ matrix.abi }}.so
