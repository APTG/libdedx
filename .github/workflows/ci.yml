name: CI

on: [push, pull_request]

jobs:
  build_and_test:
    runs-on: ${{ matrix.platform }}
    strategy:
      matrix:
        platform: [ubuntu-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check CMake version
        run: cmake --version

      - name: Configure
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build --parallel

      - name: Run CTest
        if: ${{ runner.os == 'Linux' }}
        run: ctest --test-dir build --output-on-failure

      - name: Run compiled programs on Linux
        if: ${{ runner.os == 'Linux' }}
        run: |
          ./build/examples/dedx_example
          ./build/examples/dedx_list
          ./build/examples/dedx_use_wrappers

      - name: Run compiled programs on Windows
        if: ${{ runner.os == 'Windows' }}
        run: |
          ./build/examples/Debug/dedx_example
          ./build/examples/Debug/dedx_list

  valgrind:
    runs-on: ubuntu-latest
    needs: build_and_test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build --parallel

      - name: Install Valgrind
        run: |
          sudo apt-get update
          sudo apt-get install -y valgrind

      - name: Valgrind test_bethe_ext00
        run: |
          valgrind --leak-check=full --track-origins=yes --error-exitcode=1 \
            ./build/tests/test_bethe_ext00

  python_tests:
    runs-on: ubuntu-latest
    needs: build_and_test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure
        run: cmake -S . -B build -DBUILD_SHARED_LIBS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Install pytest
        run: python -m pip install pytest

      - name: Run Python tests
        env:
          LIBDEDX_SO: ${{ github.workspace }}/build/libdedx/libdedx.so
          PYTHONPATH: ${{ github.workspace }}/python
        run: pytest python/tests -q
