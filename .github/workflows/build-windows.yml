name: Build Windows Binaries

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure
        run: >
          cmake -S . -B build
          -DDEDX_BUILD_EXAMPLES=ON
          -DDEDX_BUILD_TESTS=OFF
          -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/stage

      - name: Build
        run: cmake --build build --parallel --config Release

      - name: Install
        run: cmake --install build --config Release

      - name: Prepare Windows install tree
        shell: pwsh
        run: |
          $pkg = "libdedx-windows-x86_64"
          if (Test-Path $pkg) { Remove-Item -Recurse -Force $pkg }
          New-Item -ItemType Directory -Path $pkg | Out-Null
          Copy-Item -Recurse stage\* $pkg\

      - name: Package Windows install tree
        if: github.event_name == 'release'
        shell: pwsh
        run: |
          $pkg = "libdedx-windows-x86_64"
          New-Item -ItemType Directory -Path dist | Out-Null
          Compress-Archive -Path $pkg -DestinationPath "dist\$pkg.zip"

      - name: Upload artifact for testing
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v7
        with:
          name: libdedx-windows-x86_64
          path: libdedx-windows-x86_64/
          retention-days: 3

      - name: Upload artifact to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3
        with:
          files: dist/libdedx-windows-x86_64.zip
