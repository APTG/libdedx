name: Build Linux Packages

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-linux-packages:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Configure
        run: >
          cmake -S . -B build-packaging
          -DCMAKE_BUILD_TYPE=Release
          -DDEDX_BUILD_EXAMPLES=ON
          -DDEDX_BUILD_TESTS=OFF

      - name: Build
        run: cmake --build build-packaging --parallel

      - name: Build DEB package
        run: cpack --config build-packaging/CPackConfig.cmake -G DEB -B dist

      - name: Build RPM package
        run: cpack --config build-packaging/CPackConfig.cmake -G RPM -B dist

      - name: Upload package artifacts for testing
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: libdedx-linux-packages
          path: |
            dist/*.deb
            dist/*.rpm
          retention-days: 3

      - name: Upload package artifacts to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.deb
            dist/*.rpm
